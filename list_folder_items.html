<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>List Folder Items</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1a2e;
    color: #e0e0e0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 0.85rem;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    background: #16213e;
    border-bottom: 1px solid #0f3460;
    padding: 8px 16px;
    flex-shrink: 0;
  }
  header h1 {
    font-size: 1rem;
    color: #a8dadc;
    font-weight: 600;
    letter-spacing: 0.04em;
  }

  .panes {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  .pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border-right: 1px solid #0f3460;
  }
  .pane:last-child { border-right: none; }

  /* Toolbar: back/fwd + path */
  .pane-toolbar {
    display: flex;
    align-items: center;
    gap: 4px;
    background: #16213e;
    border-bottom: 1px solid #0f3460;
    padding: 4px 8px;
    flex-shrink: 0;
  }

  .nav-btn {
    background: #0f1b2d;
    border: 1px solid #0f3460;
    color: #a8dadc;
    font-size: 0.8rem;
    padding: 2px 8px;
    border-radius: 3px;
    cursor: pointer;
    line-height: 1.4;
    flex-shrink: 0;
    transition: background 0.1s;
  }
  .nav-btn:hover:not(:disabled) { background: #1e2a45; color: #fff; }
  .nav-btn:disabled { color: #3a4a5a; cursor: default; border-color: #1a2a3a; }

  .pane-path {
    flex: 1;
    font-family: monospace;
    font-size: 0.78rem;
    color: #a8dadc;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    padding: 0 4px;
  }

  .pane-table-wrap {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }

  thead {
    position: sticky;
    top: 0;
    z-index: 1;
    background: #16213e;
  }

  th {
    padding: 5px 8px;
    text-align: left;
    font-weight: 600;
    color: #a8dadc;
    border-bottom: 1px solid #0f3460;
    white-space: nowrap;
    overflow: hidden;
    font-size: 0.78rem;
    letter-spacing: 0.03em;
    cursor: pointer;
    user-select: none;
  }
  th:hover { color: #fff; background: #1e2a45; }
  th.sort-asc::after  { content: ' ↑'; color: #e0e0a0; }
  th.sort-desc::after { content: ' ↓'; color: #e0e0a0; }

  td {
    padding: 3px 8px;
    border-bottom: 1px solid #0f3460;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .col-name     { width: auto; }
  .col-ext      { width: 52px; }
  .col-items    { width: 62px; }
  .col-size     { width: 90px; }
  .col-modified { width: 140px; }

  td.col-ext, td.col-items, td.col-size, td.col-modified {
    font-family: monospace;
    font-size: 0.78rem;
    color: #b0b8c8;
  }
  td.col-modified { color: #8a95a5; }

  tr.row-up td.col-name { color: #a8dadc; cursor: pointer; }
  tr.row-dir td.col-name { color: #c8d8f0; cursor: pointer; }
  tr.row-dir td.col-name:hover,
  tr.row-up  td.col-name:hover { color: #fff; text-decoration: underline; }

  tr:hover td { background: #1e2a45; }

  .icon { margin-right: 5px; font-size: 0.75rem; }
  .icon-dir  { color: #a8dadc; }
  .icon-file { color: #6a7a8a; }

  .pane-filter {
    display: flex;
    align-items: center;
    gap: 6px;
    background: #16213e;
    border-top: 1px solid #0f3460;
    padding: 5px 10px;
    flex-shrink: 0;
  }
  .pane-filter label { color: #6a8090; font-size: 0.75rem; flex-shrink: 0; }
  .pane-filter input {
    flex: 1;
    background: #0f1b2d;
    border: 1px solid #0f3460;
    color: #e0e0e0;
    padding: 3px 7px;
    font-size: 0.8rem;
    border-radius: 3px;
    outline: none;
  }
  .pane-filter input:focus { border-color: #a8dadc; }

  .error-msg   { color: #e07070; padding: 8px 10px; font-size: 0.8rem; }
  .loading-msg { color: #6a8090; padding: 8px 10px; font-size: 0.8rem; font-style: italic; }

  @keyframes flash-return {
    0%   { background: #2a4a30; }
    100% { background: transparent; }
  }
  tr.highlight-return td { animation: flash-return 1.8s ease forwards; }

  /* ── Preview overlay ── */
  .preview-overlay {
    position: fixed;
    z-index: 100;
    background: #111827;
    border: 1px solid #a8dadc;
    border-radius: 5px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    width: 480px;
    max-height: 60vh;
    display: flex;
    flex-direction: column;
    font-size: 0.8rem;
  }
  .preview-overlay.hidden { display: none; }

  .preview-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 12px;
    background: #16213e;
    border-bottom: 1px solid #0f3460;
    font-weight: 600;
    color: #a8dadc;
    flex-shrink: 0;
    gap: 8px;
  }
  .preview-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .preview-hint { color: #4a6070; font-size: 0.72rem; font-weight: normal; flex-shrink: 0; }

  .preview-body { overflow-y: auto; flex: 1; }
  .preview-body table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  .preview-body th {
    padding: 4px 8px;
    background: #16213e;
    color: #a8dadc;
    font-size: 0.75rem;
    font-weight: 600;
    border-bottom: 1px solid #0f3460;
    position: sticky;
    top: 0;
    text-align: left;
  }
  .preview-body td {
    padding: 2px 8px;
    border-bottom: 1px solid #0d1a2a;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: #c8d0dc;
  }
  .preview-body td.p-ext, .preview-body td.p-size {
    font-family: monospace;
    font-size: 0.75rem;
    color: #8090a0;
  }
  .p-name { width: auto; }
  .p-ext  { width: 48px; }
  .p-size { width: 84px; }
  .preview-empty { color: #4a6070; padding: 10px 12px; font-style: italic; }
</style>
</head>
<body>

<header>
  <h1>List Folder Items</h1>
</header>

<div id="preview-overlay" class="preview-overlay hidden">
  <div class="preview-header">
    <span class="preview-title" id="preview-title"></span>
    <span class="preview-hint">Esc to close</span>
  </div>
  <div class="preview-body" id="preview-body"></div>
</div>

<div class="panes">

  <div class="pane" id="pane-left">
    <div class="pane-toolbar">
      <button class="nav-btn" id="back-left"    onclick="goBack('left')"    disabled title="Back">◀</button>
      <button class="nav-btn" id="fwd-left"     onclick="goForward('left')" disabled title="Forward">▶</button>
      <div class="pane-path" id="path-left"></div>
    </div>
    <div class="pane-table-wrap" id="wrap-left">
      <span class="loading-msg">Loading…</span>
    </div>
    <div class="pane-filter">
      <label>Filter:</label>
      <input type="text" id="filter-left" placeholder="type to filter…" oninput="filterPane('left')">
    </div>
  </div>

  <div class="pane" id="pane-right">
    <div class="pane-toolbar">
      <button class="nav-btn" id="back-right"   onclick="goBack('right')"    disabled title="Back">◀</button>
      <button class="nav-btn" id="fwd-right"    onclick="goForward('right')" disabled title="Forward">▶</button>
      <div class="pane-path" id="path-right"></div>
    </div>
    <div class="pane-table-wrap" id="wrap-right">
      <span class="loading-msg">Loading…</span>
    </div>
    <div class="pane-filter">
      <label>Filter:</label>
      <input type="text" id="filter-right" placeholder="type to filter…" oninput="filterPane('right')">
    </div>
  </div>

</div>

<script>
let hoveredRow = null;

const DEFAULTS = {
  left:  '/home/nesha/Downloads/comics_download/',
  right: '/mnt/extramedia/Comics/',
};

const state = {
  left: {
    path: DEFAULTS.left, data: [], parent: null,
    sort: { col: 'name', dir: 'asc' },
    backStack: [], fwdStack: [],
  },
  right: {
    path: DEFAULTS.right, data: [], parent: null,
    sort: { col: 'name', dir: 'asc' },
    backStack: [], fwdStack: [],
  },
};

// ── Navigation ────────────────────────────────────────────────

function basename(path) {
  return path.replace(/\/$/, '').split('/').pop();
}

function navigate(side, path) {
  const s = state[side];
  // If navigating to parent (..), highlight the folder we came from
  const scrollTo = (s.parent && path === s.parent) ? basename(s.path) : null;
  s.backStack.push(s.path);
  s.fwdStack = [];
  _loadPane(side, path, scrollTo);
}

function goBack(side) {
  const s = state[side];
  if (!s.backStack.length) return;
  const scrollTo = basename(s.path); // folder we're leaving
  s.fwdStack.push(s.path);
  _loadPane(side, s.backStack.pop(), scrollTo);
}

function goForward(side) {
  const s = state[side];
  if (!s.fwdStack.length) return;
  s.backStack.push(s.path);
  _loadPane(side, s.fwdStack.pop());
}

function updateNavButtons(side) {
  const s = state[side];
  document.getElementById('back-' + side).disabled = s.backStack.length === 0;
  document.getElementById('fwd-'  + side).disabled = s.fwdStack.length === 0;
}

// ── Loading ───────────────────────────────────────────────────

async function _loadPane(side, path, scrollTo = null) {
  const s = state[side];
  document.getElementById('path-' + side).textContent = path;
  document.getElementById('wrap-' + side).innerHTML = '<span class="loading-msg">Loading…</span>';
  document.getElementById('filter-' + side).value = '';
  updateNavButtons(side);

  try {
    const resp = await fetch('/api/list?path=' + encodeURIComponent(path));
    const json = await resp.json();
    if (!resp.ok) throw new Error(json.error || resp.statusText);
    s.path   = json.path;
    s.parent = json.parent;
    s.data   = json.items;
    document.getElementById('path-' + side).textContent = json.path;
    renderPane(side);
    if (scrollTo) scrollToFolder(side, scrollTo);
  } catch (e) {
    document.getElementById('wrap-' + side).innerHTML =
      `<span class="error-msg">Error: ${e.message}</span>`;
  }
}

// Initial load — no history push
function loadPane(side, path) {
  _loadPane(side, path);
}

// ── Sorting ───────────────────────────────────────────────────

function setSort(side, col) {
  const s = state[side].sort;
  if (s.col === col) {
    s.dir = s.dir === 'asc' ? 'desc' : 'asc';
  } else {
    s.col = col;
    s.dir = 'asc';
  }
  renderPane(side);
}

function sortItems(items, col, dir) {
  const mult = dir === 'asc' ? 1 : -1;
  return [...items].sort((a, b) => {
    let va, vb;
    switch (col) {
      case 'name':     va = a.name.toLowerCase();    vb = b.name.toLowerCase();    break;
      case 'ext':      va = a.ext.toLowerCase();     vb = b.ext.toLowerCase();     break;
      case 'items':    va = a.items_count ?? -1;     vb = b.items_count ?? -1;     break;
      case 'size':     va = a.size_bytes ?? -1;      vb = b.size_bytes ?? -1;      break;
      case 'modified': va = a.mtime ?? 0;            vb = b.mtime ?? 0;            break;
      default:         va = a.name.toLowerCase();    vb = b.name.toLowerCase();
    }
    if (va < vb) return -1 * mult;
    if (va > vb) return  1 * mult;
    return 0;
  });
}

// ── Rendering ─────────────────────────────────────────────────

function renderPane(side) {
  const s = state[side];
  const filterLow = (document.getElementById('filter-' + side).value || '').toLowerCase();
  const { col, dir } = s.sort;

  let items = s.data.filter(it =>
    !filterLow || it.name.toLowerCase().includes(filterLow)
  );
  items = sortItems(items, col, dir);

  const thClass = (c) => c === col ? `class="col-${c} sort-${dir}"` : `class="col-${c}"`;

  let html = `<table>
<thead><tr>
  <th ${thClass('name')}     onclick="setSort('${side}','name')">Name</th>
  <th ${thClass('ext')}      onclick="setSort('${side}','ext')">Ext</th>
  <th ${thClass('items')}    onclick="setSort('${side}','items')">Items</th>
  <th ${thClass('size')}     onclick="setSort('${side}','size')">Size</th>
  <th ${thClass('modified')} onclick="setSort('${side}','modified')">Modified</th>
</tr></thead><tbody>`;

  // Parent (..) row — always pinned at top
  if (s.parent) {
    html += `<tr class="row-up" data-path="${esc(s.parent)}">
      <td class="col-name"><span class="icon icon-dir">📁</span>..</td>
      <td class="col-ext"></td><td class="col-items"></td><td class="col-size"></td><td class="col-modified"></td>
    </tr>`;
  }

  for (const it of items) {
    if (it.is_dir) {
      const count = it.items_count !== null ? it.items_count : '?';
      const fullPath = s.path.replace(/\/$/, '') + '/' + it.name;
      html += `<tr class="row-dir" data-path="${esc(fullPath)}">
        <td class="col-name"><span class="icon icon-dir">📁</span>${esc(it.name)}</td>
        <td class="col-ext"></td>
        <td class="col-items">${count}</td>
        <td class="col-size"></td>
        <td class="col-modified">${it.modified}</td>
      </tr>`;
    } else {
      html += `<tr class="row-file">
        <td class="col-name"><span class="icon icon-file">📄</span>${esc(it.name)}</td>
        <td class="col-ext">${esc(it.ext)}</td>
        <td class="col-items"></td>
        <td class="col-size">${it.size || ''}</td>
        <td class="col-modified">${it.modified}</td>
      </tr>`;
    }
  }

  html += '</tbody></table>';
  const wrap = document.getElementById('wrap-' + side);
  wrap.innerHTML = html;

  // Attach interaction listeners after render
  wrap.querySelectorAll('tr[data-path]').forEach(tr => {
    tr.addEventListener('dblclick',    () => navigate(side, tr.dataset.path));
    tr.addEventListener('click',       () => { hoveredRow = tr; });
    tr.addEventListener('mouseenter',  () => { hoveredRow = tr; });
    tr.addEventListener('mouseleave',  () => { if (hoveredRow === tr) hoveredRow = null; });
  });
}

function filterPane(side) {
  renderPane(side);
}

function scrollToFolder(side, folderName) {
  const wrap = document.getElementById('wrap-' + side);
  for (const tr of wrap.querySelectorAll('tr[data-path]')) {
    if (basename(tr.dataset.path) === folderName) {
      tr.scrollIntoView({ block: 'center' });
      tr.classList.add('highlight-return');
      tr.addEventListener('animationend', () => tr.classList.remove('highlight-return'), { once: true });
      break;
    }
  }
}

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Preview overlay ──────────────────────────────────────────

async function openPreview(tr) {
  const path = tr.dataset.path;
  const overlay = document.getElementById('preview-overlay');
  document.getElementById('preview-title').textContent = basename(path);
  document.getElementById('preview-body').innerHTML = '<div class="preview-empty">Loading…</div>';
  positionOverlay(overlay, tr);
  overlay.classList.remove('hidden');

  try {
    const resp = await fetch('/api/list?path=' + encodeURIComponent(path));
    const json = await resp.json();
    if (!resp.ok) throw new Error(json.error || resp.statusText);
    renderPreviewBody(json.items);
  } catch (err) {
    document.getElementById('preview-body').innerHTML =
      `<div class="preview-empty" style="color:#e07070">Error: ${err.message}</div>`;
  }
}

function closePreview() {
  document.getElementById('preview-overlay').classList.add('hidden');
}

function positionOverlay(overlay, tr) {
  const rect = tr.getBoundingClientRect();
  const W = window.innerWidth, H = window.innerHeight;
  const ow = 480, oh = Math.min(H * 0.6, 400);

  let left = rect.right + 8;
  if (left + ow > W - 8) left = rect.left - ow - 8;
  left = Math.max(8, left);

  let top = rect.top;
  if (top + oh > H - 8) top = H - oh - 8;
  top = Math.max(8, top);

  overlay.style.left = left + 'px';
  overlay.style.top  = top  + 'px';
}

function renderPreviewBody(items) {
  if (!items.length) {
    document.getElementById('preview-body').innerHTML = '<div class="preview-empty">(empty folder)</div>';
    return;
  }
  const sorted = [...items].sort((a, b) => {
    if (a.is_dir !== b.is_dir) return a.is_dir ? -1 : 1;
    return a.name.toLowerCase().localeCompare(b.name.toLowerCase());
  });
  let html = `<table><thead><tr>
    <th class="p-name">Name</th><th class="p-ext">Ext</th><th class="p-size">Size</th>
  </tr></thead><tbody>`;
  for (const it of sorted) {
    const icon = it.is_dir ? '📁' : '📄';
    const ext  = it.is_dir ? '' : esc(it.ext);
    const size = it.is_dir ? `${it.items_count ?? '?'} items` : (it.size || '');
    html += `<tr>
      <td class="p-name">${icon} ${esc(it.name)}</td>
      <td class="p-ext">${ext}</td>
      <td class="p-size">${size}</td>
    </tr>`;
  }
  html += '</tbody></table>';
  document.getElementById('preview-body').innerHTML = html;
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closePreview(); return; }
  if (e.key === ' ' && hoveredRow && hoveredRow.dataset.path) {
    e.preventDefault();
    openPreview(hoveredRow);
  }
});

document.addEventListener('click', e => {
  const overlay = document.getElementById('preview-overlay');
  if (!overlay.classList.contains('hidden') && !overlay.contains(e.target)) {
    closePreview();
  }
});

// Initial load
loadPane('left',  DEFAULTS.left);
loadPane('right', DEFAULTS.right);
</script>
</body>
</html>
